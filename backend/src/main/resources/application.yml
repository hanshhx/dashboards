server:
  port: 8080

spring:
  application:
    name: suricata-dashboard-backend
  datasource:
    # 데이터 DB(suricata_db) — 읽기 전용. DataSourceConfig가 이 값으로 Hikari 구성.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:suricata_db}
    username: ${DB_USER:dashboard_user}
    password: ${DB_PASSWORD:}
  jackson:
    serialization:
      write-dates-as-timestamps: false   # 시간은 ISO-8601 문자열로
  mvc:
    throw-exception-if-no-handler-found: true   # 없는 경로 → 404로 정확히 처리
  web:
    resources:
      add-mappings: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  # 실제 테이블명이 'events'가 아니면 EVENTS_TABLE 환경변수로 바꾸세요.
  events-table: ${EVENTS_TABLE:events}
  # 프론트(Next.js) 주소. 콤마로 여러 개 가능.
  cors-origins: ${CORS_ORIGINS:http://localhost:3000}
  # API 키. 비어 있으면 인증 비활성(개발). 공개 배포 시 긴 랜덤값 권장.
  # /api/health 는 키 없이도 항상 허용.
  api-key: ${API_KEY:}
  # 사용자/인증 전용 별도 DB (dashboard_app) — 읽기/쓰기. 데이터 DB와 분리.
  auth:
    datasource:
      url: jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5432}/${APP_DB_NAME:dashboard_app}
      username: ${APP_DB_USER:dashboard_app_user}
      password: ${APP_DB_PASSWORD:}
  # JWT 서명 키(반드시 JWT_SECRET 환경변수로, 32자 이상) + 만료(시간)
  jwt:
    secret: ${JWT_SECRET:}
    expiry-hours: ${JWT_EXPIRY_HOURS:12}
